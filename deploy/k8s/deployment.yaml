apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery
  namespace: __NAMESPACE__
  labels:
    app: discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery
  template:
    metadata:
      labels:
        app: discovery
    spec:
      containers:
        - name: discovery
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '3000'
            - name: NODE_OPTIONS
              value: --dns-result-order=ipv4first
            - name: DISCOVERY_SYNC_ON_START
              value: 'true'
            - name: PGPOOL_MAX
              value: '10'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: discovery-env
                  key: DATABASE_URL
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: discovery-env
                  key: ADMIN_API_KEY
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: discovery-env
                  key: OPENROUTER_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
