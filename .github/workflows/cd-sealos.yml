name: CD Sealos

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/discovery
      IMAGE_TAG: ${{ github.sha }}
      SEALOS_NAMESPACE: ${{ secrets.SEALOS_NAMESPACE }}
      SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      DISCOVERY_ADMIN_API_KEY: ${{ secrets.DISCOVERY_ADMIN_API_KEY }}
      DISCOVERY_OPENROUTER_API_KEY: ${{ secrets.DISCOVERY_OPENROUTER_API_KEY }}
      SEALOS_INGRESS_HOST: ${{ secrets.SEALOS_INGRESS_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 --decode > "$HOME/.kube/config"
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Ensure namespace
        run: kubectl create namespace "$SEALOS_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply runtime secret
        run: |
          kubectl -n "$SEALOS_NAMESPACE" create secret generic discovery-env \
            --from-literal=DATABASE_URL="$SUPABASE_DATABASE_URL" \
            --from-literal=ADMIN_API_KEY="$DISCOVERY_ADMIN_API_KEY" \
            --from-literal=OPENROUTER_API_KEY="$DISCOVERY_OPENROUTER_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render manifests
        run: |
          sed \
            -e "s#__IMAGE__#${IMAGE_NAME}:sha-${GITHUB_SHA}#g" \
            -e "s#__NAMESPACE__#${SEALOS_NAMESPACE}#g" \
            deploy/k8s/deployment.yaml > /tmp/discovery-deployment.yaml
          sed \
            -e "s#__NAMESPACE__#${SEALOS_NAMESPACE}#g" \
            deploy/k8s/service.yaml > /tmp/discovery-service.yaml

      - name: Apply deployment and service
        run: |
          kubectl apply -f /tmp/discovery-deployment.yaml
          kubectl apply -f /tmp/discovery-service.yaml
          kubectl -n "$SEALOS_NAMESPACE" rollout status deploy/discovery --timeout=180s

      - name: Apply ingress if configured
        if: ${{ env.SEALOS_INGRESS_HOST != '' }}
        run: |
          sed \
            -e "s#__NAMESPACE__#${SEALOS_NAMESPACE}#g" \
            -e "s#__HOST__#${SEALOS_INGRESS_HOST}#g" \
            deploy/k8s/ingress.yaml > /tmp/discovery-ingress.yaml
          kubectl apply -f /tmp/discovery-ingress.yaml
