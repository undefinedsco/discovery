services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: discovery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - discovery-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d discovery']
      interval: 5s
      timeout: 5s
      retries: 10

  discovery:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/discovery
      ADMIN_API_KEY: change-me
      HOST: 0.0.0.0
      PORT: 3000
      DISCOVERY_SYNC_ON_START: 'true'
      PGPOOL_MAX: 10
    ports:
      - '3000:3000'

volumes:
  discovery-postgres-data:
